services:
  - type: web
    name: aaci-monsai-backend
    runtime: java
    plan: free
    region: oregon
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/*.jar
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # --- Configurações do Banco de Dados (PostgreSQL no Render) ---
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: aaci-monsai-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: aaci-monsai-db
          property: password

      # --- Segurança e JWT ---
      - key: SECURITY_JWT_SECRET
        generateValue: true # O Render gera uma chave segura automaticamente
      - key: SECURITY_JWT_EXPIRATION
        value: "86400000"

      # --- Hibernate / JPA ---
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: "true"
      - key: SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL
        value: "true"

      # --- MQTT (Configurações de Produção) ---
      # No Render, você não pode usar 'localhost'.
      # Você precisará de um broker externo (como HiveMQ ou Mosquitto Cloud)
      - key: MQTT_BROKER_URL
        sync: false # Você preencherá manualmente no painel do Render
      - key: MQTT_TOPIC
        value: monsai/telemetria
      - key: MQTT_CLIENT_ID
        value: monsai-backend-api

databases:
  - name: aaci-monsai-db
    databaseName: monsai_db
    user: monsai_admin
    plan: free