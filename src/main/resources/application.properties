spring.application.name=monsai

# Configurações do JWT
security.jwt.secret=${SECURITY_JWT_SECRET:monsaiSistemaSeguroJwtChaveMuitoForte123456}
security.jwt.expiration=${SECURITY_JWT_EXPIRATION:86400000}

# ==========================================
# Configuração do PostgreSQL
# ==========================================
# A URL, usuário e senha serão injetados automaticamente pelo Render
# através das variáveis SPRING_DATASOURCE_* no render.yaml
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/monsai}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:suasenhalocal}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# Configuração do MQTT
# ==========================================
mqtt.broker-url=${MQTT_BROKER_URL:tcp://localhost:1883}
mqtt.client-id=${MQTT_CLIENT_ID:monsai-backend-api}
mqtt.topic=${MQTT_TOPIC:monsai/telemetria}
mqtt.username=${MQTT_USER:}
mqtt.password=${MQTT_PASS:}
mqtt.clean-session=true
mqtt.automatic-reconnect=true

# ==========================================
# Configuração de Porta (Importante para o Render)
# ==========================================
server.port=${PORT:8080}