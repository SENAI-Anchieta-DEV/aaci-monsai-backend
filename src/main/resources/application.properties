spring.application.name=monsai

# Configuraçőes do JWT
security.jwt.secret=monsaiSistemaSeguroJwtChaveMuitoForte123456
security.jwt.expiration=86400000

# Configuraçőes do Banco de Dados em Memória (H2)
spring.datasource.url=jdbc:h2:mem:monsaidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Pede pro Hibernate criar as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Libera o painel visual do banco no navegador (opcional, mas muito útil)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console